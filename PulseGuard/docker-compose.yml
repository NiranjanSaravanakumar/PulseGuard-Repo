version: "3.9"

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: pulseguard-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: pulseguard
      MONGO_INITDB_ROOT_PASSWORD: pulseguard_secret
      MONGO_INITDB_DATABASE: pulseguard
    volumes:
      - mongo_data:/data/db
      - ./mongo-seed/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - pulseguard-net

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulseguard-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://pulseguard:pulseguard_secret@mongo:27017/pulseguard?authSource=admin
      MONGO_DB:  pulseguard
    depends_on:
      - mongo
    networks:
      - pulseguard-net

  # ── Sensor Simulator ──────────────────────────────────────────────────────
  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulseguard-simulator
    restart: unless-stopped
    command: python simulator.py
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - pulseguard-net

  # ── React Frontend (dev server) ───────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: pulseguard-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_WS_URL:  ws://localhost:8000
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - pulseguard-net

volumes:
  mongo_data:

networks:
  pulseguard-net:
    driver: bridge
